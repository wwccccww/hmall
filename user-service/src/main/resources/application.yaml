server:
  port: 8084

#hm:
#  swagger:
#    title: "用户服务接口文档"
#    package: com.hmall.user.controller
#  db:
#    database: hm-user

spring:
  application:
    name: user-service
  output:
    ansi:
      enabled: ALWAYS
  datasource:
    url: jdbc:mysql://${hm.db.host}:3306/hm-user?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: ${hm.db.pw}

  cloud:
    nacos:
      discovery:
        server-addr: ${spring.cloud.nacos.server-addr}


mybatis-plus:
  configuration:
    default-enum-type-handler: com.baomidou.mybatisplus.core.handlers.MybatisEnumTypeHandler
  global-config:
    db-config:
      update-strategy: not_null
      id-type: auto
logging:
  level:
    com.hmall: debug
  pattern:
    dateformat: HH:mm:ss:SSS
  file:
    path: "logs/${spring.application.name}"

# springdoc：显式扫描 Controller，避免与 Nacos 等配置组合时出现文档为空
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
  packages-to-scan: com.hmall.user.controller
  default-consumes-media-type: application/json
  default-produces-media-type: application/json

# 标题/分组包名以 Nacos shared-swagger 为准时，依赖占位符 ${hm.swagger.*}，请在各环境 yaml（如 application-local）中按微服务设置 hm.swagger
knife4j:
  enable: true
  setting:
    language: zh_cn
    enable-swagger-models: true
  openapi:
    title: 用户服务接口文档
    description: "hmall 用户与地址；调试说明见 OpenAPI info 与 Authorize（user-info）"
    email: zhanghuyi@itcast.cn
    concat: 虎哥
    url: https://www.itcast.cn
    version: v1.0.0
    group:
      default:
        group-name: default
        api-rule: package
        api-rule-resources:
          - com.hmall.user.controller
hm:
  db:
    database: hm-user
  jwt:
    location: classpath:hmall.jks
    alias: hmall
    password: hmall123
    tokenTTL: 30m
  auth:
    excludePaths:
      - /search/**
      - /users/login
      - /items/**
      - /hi
# keytool -genkeypair -alias hmall -keyalg RSA -keypass hmall123 -keystore hmall.jks -storepass hmall123