server:
  port: 8090

spring:
  application:
    name: ai-assistant-service
  output:
    ansi:
      enabled: ALWAYS

knife4j:
  enable: true
  openapi:
    title: ${hm.swagger.title:AI 导购助手接口文档}
    description: ${hm.swagger.description:AI 导购助手接口文档}
    version: v1.0.0

hm:
  ai:
    llm:
      base-url: ${HM_AI_LLM_BASE_URL:https://api.openai.com}
      api-key: ${HM_AI_LLM_API_KEY:}
      model: ${HM_AI_LLM_MODEL:gpt-4o-mini}
      timeout-ms: ${HM_AI_LLM_TIMEOUT_MS:15000}
      # 非空时：通用导购走百炼「智能体」Responses API（控制台绑定知识库即可启用内置 RAG）
      bailian-app-id: ${HM_AI_BAILIAN_APP_ID:}
      bailian-endpoint-base: ${HM_AI_BAILIAN_ENDPOINT_BASE:https://dashscope.aliyuncs.com}
    rag:
      item-base-url: ${HM_AI_ITEM_BASE_URL:http://item-service:8081}
      promotion-base-url: ${HM_AI_PROMOTION_BASE_URL:http://promotion-service:8087}
      item-max-pages: ${HM_AI_RAG_ITEM_MAX_PAGES:2}
      public-coupon-max: ${HM_AI_RAG_PUBLIC_COUPON_MAX:15}
      # 导购优先走 item-service GET /search/list（Elasticsearch）；false 则仅用 /items/page
      use-elasticsearch: ${HM_AI_RAG_USE_ES:true}
      # ES 召回条数（写入 prompt 时会再截断，控制 token）
      search-top-k: ${HM_AI_RAG_SEARCH_TOP_K:20}
      prompt-max-items: ${HM_AI_RAG_PROMPT_MAX_ITEMS:12}

