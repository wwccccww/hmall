server:
  port: 8090

spring:
  application:
    name: ai-assistant-service
  output:
    ansi:
      enabled: ALWAYS

knife4j:
  enable: true
  openapi:
    title: ${hm.swagger.title:AI 导购助手接口文档}
    description: ${hm.swagger.description:AI 导购助手接口文档}
    version: v1.0.0

hm:
  ai:
    # 工具调用（我的信息/地址/券/订单）直连下游；本机开发默认 localhost，虚拟机/ Docker 请改环境变量
    downstream:
      user-service-url: ${HM_AI_USER_SERVICE_URL:http://localhost:8084}
      trade-service-url: ${HM_AI_TRADE_SERVICE_URL:http://localhost:8085}
      promotion-service-url: ${HM_AI_PROMOTION_SERVICE_URL:http://localhost:8087}
    # TODO可选：配置后每条商品来源会带完整商品页链接（如 http://localhost:5173）；不配则仅相对路径 /product/:id
    mall:
      front-base-url: ${HM_AI_MALL_FRONT_BASE_URL:}
    llm:
      base-url: ${HM_AI_LLM_BASE_URL:https://api.openai.com}
      api-key: ${HM_AI_LLM_API_KEY:}
      model: ${HM_AI_LLM_MODEL:gpt-4o-mini}
      timeout-ms: ${HM_AI_LLM_TIMEOUT_MS:15000}
      # 非空时：通用导购走百炼「智能体」Responses API（控制台绑定知识库即可启用内置 RAG）
      bailian-app-id: ${HM_AI_BAILIAN_APP_ID:}
      bailian-endpoint-base: ${HM_AI_BAILIAN_ENDPOINT_BASE:https://dashscope.aliyuncs.com}
    rag:
      item-base-url: ${HM_AI_ITEM_BASE_URL:http://item-service:8081}
      promotion-base-url: ${HM_AI_PROMOTION_BASE_URL:http://promotion-service:8087}
      # true 且已配置 hm.ai.llm.api-key：商品检索前用 LLM 抽取价格/类目/品牌/颜色/尺寸，与规则解析合并
      llm-intent-enabled: ${HM_AI_RAG_LLM_INTENT_ENABLED:false}
      # 导购优先走 item-service GET /search/list（Elasticsearch）；false 则仅用 /items/page
      use-elasticsearch: ${HM_AI_RAG_USE_ES:true}
      item-max-pages: ${HM_AI_RAG_ITEM_MAX_PAGES:2}
      public-coupon-max: ${HM_AI_RAG_PUBLIC_COUPON_MAX:15}
      # ES 召回条数（写入 prompt 时会再截断，控制 token）
      search-top-k: ${HM_AI_RAG_SEARCH_TOP_K:20}
      prompt-max-items: ${HM_AI_RAG_PROMPT_MAX_ITEMS:12}

    # 本地 Markdown → ES 向量索引（索引名默认 ai_kb_chunks，与商品索引隔离）
    # es-host：必须与「运行 ai-assistant 的进程」网络可达（本机连虚拟机填虚拟机 IP；同机填 localhost）
    knowledge:
      enabled: ${HM_AI_KNOWLEDGE_ENABLED:true}
      es-host: ${HM_AI_KNOWLEDGE_ES_HOST:192.168.116.130}
      es-port: ${HM_AI_KNOWLEDGE_ES_PORT:9200}
      es-index: ${HM_AI_KNOWLEDGE_ES_INDEX:ai_kb_chunks}
      search-top-k: ${HM_AI_KNOWLEDGE_SEARCH_TOP_K:5}
      max-prompt-chars: ${HM_AI_KNOWLEDGE_MAX_PROMPT_CHARS:3600}
      auto-reindex-if-empty: ${HM_AI_KNOWLEDGE_AUTO_REINDEX:true}
      admin-token: ${HM_AI_KNOWLEDGE_ADMIN_TOKEN:}

    # OpenAI 兼容 /v1/embeddings（默认百炼 compatible-mode；dims 须与模型一致）
    embedding:
      base-url: ${HM_AI_EMBEDDING_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode}
      model: ${HM_AI_EMBEDDING_MODEL:text-embedding-v2}
      api-key: ${HM_AI_EMBEDDING_API_KEY:}
      dims: ${HM_AI_EMBEDDING_DIMS:1536}
      timeout-ms: ${HM_AI_EMBEDDING_TIMEOUT_MS:30000}
      batch-size: ${HM_AI_EMBEDDING_BATCH_SIZE:8}

