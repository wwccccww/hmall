name: Deploy-self-hosted (Local Runner)

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "镜像标签（默认 latest；也可填某次 Publish 的 SHA tag）"
        required: true
        default: "latest"

  workflow_run:
    workflows: ["Publish Docker images"]
    types:
      - completed

jobs:
  deploy:
    # 核心修改：指定在你刚才配置的 Docker Runner 上运行
    runs-on: self-hosted
    
    # 只有手动触发，或者 Publish 成功后才运行
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'




    steps:
      - name: 计算镜像标签
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          fi


      
      - name: 执行本地部署
        run: |
          set -e
          # 进入项目目录（该目录需要存在 docker-compose.yml）
          cd /root/hmall

          # 登录阿里云 ACR 并拉取部署
          docker login "${{ secrets.ACR_REGISTRY }}" -u "${{ secrets.ACR_USERNAME }}" -p "${{ secrets.ACR_PASSWORD }}"

          export ACR_REGISTRY="${{ secrets.ACR_REGISTRY }}"
          export ACR_NAMESPACE="${{ secrets.ACR_NAMESPACE }}"
          export TAG="${{ steps.tag.outputs.value }}"

          docker compose pull
          docker compose up -d --no-build || {
            echo "=== docker compose ps -a ==="
            docker compose ps -a || true
            echo "=== hmall-nacos logs (tail 200) ==="
            docker logs hmall-nacos --tail 200 2>&1 || true
            exit 1
          }
          docker image prune -f
      
