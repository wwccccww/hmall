name: Deploy to VM (pull from ACR)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "要部署的镜像标签（默认 latest；也可填某次构建的 SHA tag）"
        required: true
        default: "latest"
  workflow_run:
    workflows: ["Publish Docker images"]
    types: [completed]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch'


      
      # github.event_name == 'workflow_dispatch' ||
      # (github.event.workflow_run.conclusion == 'success')

    steps:
      - name: 计算部署 tag
        id: tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            # Publish workflow 默认会推送两类 tag：head_sha 与 latest
            echo "value=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: SSH 到虚拟机并部署（pull + up）
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_SSH_PORT || 22 }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -euo pipefail

            echo "[1/5] go to app dir"
            cd "${{ secrets.VM_APP_DIR }}"

            echo "[2/5] update repo"
            if [ -d .git ]; then
              git fetch --all --prune
              git checkout "${{ secrets.VM_GIT_REF || 'main' }}"
              git pull --ff-only
            else
              echo "ERROR: VM_APP_DIR is not a git repo. Please git clone first." >&2
              exit 1
            fi

            echo "[3/5] docker login ACR"
            docker login "${{ secrets.ACR_REGISTRY }}" -u "${{ secrets.ACR_USERNAME }}" -p "${{ secrets.ACR_PASSWORD }}"

            echo "[4/5] pull images"
            export ACR_REGISTRY="${{ secrets.ACR_REGISTRY }}"
            export ACR_NAMESPACE="${{ secrets.ACR_NAMESPACE }}"
            export TAG="${{ steps.tag.outputs.value }}"
            docker compose pull

            echo "[5/5] up (no build)"
            docker compose up -d --no-build

            docker compose ps

