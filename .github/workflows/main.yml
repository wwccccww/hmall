# 持续集成：推送或 PR 到 main/master 时编译后端、构建前端
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Maven（全模块）
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"
          cache: maven

      - name: 编译与测试
        run: mvn -B -ntp verify

  frontend:
    name: Vue 3（Vite）
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: hmall-vue3/package-lock.json

      - name: 安装依赖
        working-directory: hmall-vue3
        run: npm ci

      - name: 生产构建
        working-directory: hmall-vue3
        run: npm run build
