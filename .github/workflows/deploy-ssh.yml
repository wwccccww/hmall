# 持续部署（示例）：SSH 到服务器执行 docker compose pull + up
#
# 先在服务器准备好：
#   1) 克隆本仓库（或至少包含 docker-compose.yml、docker-compose.ghcr.yml、.env、docker/ 等）
#   2) 已能本机 docker compose up 跑通中间件与业务
#
# 仓库 Settings → Secrets and variables → Actions 配置：
#   DEPLOY_HOST          服务器 IP 或域名
#   DEPLOY_USER          SSH 登录用户
#   DEPLOY_SSH_KEY       对应私钥全文（含 BEGIN/END）
#   DEPLOY_PATH          项目在服务器上的目录，如 /opt/hmall
#   GHCR_OWNER_LOWER     GitHub 用户名/组织的小写，与 ghcr.io 路径一致
#   GHCR_PULL_USER       用于 docker login ghcr.io 的用户名（通常同 GitHub）
#   GHCR_PULL_TOKEN      经典 PAT，勾选 read:packages（勿用会过期的 fine-grained 除非你知道怎么配）
#
name: Deploy (SSH)

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "镜像标签，需与 Publish 时一致；填 commit SHA 可精确对齐某次构建"
        required: true
        default: "latest"

  workflow_run:
    workflows: ["Publish Docker images"]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: 计算镜像标签
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: SSH 部署
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            export GHCR_OWNER="${{ secrets.GHCR_OWNER_LOWER }}"
            export HMALL_IMAGE_TAG="${{ steps.tag.outputs.value }}"
            echo "${{ secrets.GHCR_PULL_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_PULL_USER }}" --password-stdin
            docker compose -f docker-compose.yml -f docker-compose.ghcr.yml pull
            docker compose -f docker-compose.yml -f docker-compose.ghcr.yml up -d --no-build
