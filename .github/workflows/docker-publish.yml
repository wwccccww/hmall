# 持续交付：在 GitHub 上手动触发/或 CI 成功后触发，将各微服务镜像推送到阿里云 ACR
# 需要在仓库 Secrets 配置：ACR_REGISTRY、ACR_NAMESPACE、ACR_USERNAME、ACR_PASSWORD
# 拉取示例：docker pull ${ACR_REGISTRY}/${ACR_NAMESPACE}/hmall-hm-gateway:latest
name: Publish Docker images

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "镜像标签（如 latest 或 v1.0.0）"
        required: true
        default: "latest"
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

permissions:
  contents: read

jobs:
  compute-tag:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        (github.event.workflow_run.head_branch == 'main' || github.event.workflow_run.head_branch == 'master')
      )
    outputs:
      tag: ${{ steps.tag.outputs.value }}
    steps:
      - name: 计算镜像标签
        id: tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          fi

  detect-changes:
    needs: compute-tag
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      count: ${{ steps.set-matrix.outputs.count }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: 生成需要构建的服务矩阵
        id: set-matrix
        shell: bash
        run: |
          set -euo pipefail

          services=(hm-gateway item-service cart-service user-service trade-service pay-service promotion-service ai-assistant-service)

          default_branch="${{ github.event.repository.default_branch }}"
          git fetch --no-tags --prune origin "+refs/heads/${default_branch}:refs/remotes/origin/${default_branch}"

          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            head="${{ github.event.workflow_run.head_sha }}"
            base="$(git rev-parse "${head}^" 2>/dev/null || echo "origin/${default_branch}")"
          else
            head="${GITHUB_SHA}"
            base="origin/${default_branch}"
          fi

          changed_files="$(git diff --name-only "${base}" "${head}" || true)"
          echo "Changed files:"
          echo "${changed_files}"

          rebuild_all="false"
          selected=()

          while IFS= read -r f; do
            [[ -z "${f}" ]] && continue

            case "${f}" in
              pom.xml|docker/*|hm-common/*|hm-api/*)
                rebuild_all="true"
                ;;
            esac

            case "${f}" in
              hm-gateway/*|docker/services/hm-gateway/*) selected+=("hm-gateway") ;;
              item-service/*|docker/services/item-service/*) selected+=("item-service") ;;
              cart-service/*|docker/services/cart-service/*) selected+=("cart-service") ;;
              user-service/*|docker/services/user-service/*) selected+=("user-service") ;;
              trade-service/*|docker/services/trade-service/*) selected+=("trade-service") ;;
              pay-service/*|docker/services/pay-service/*) selected+=("pay-service") ;;
              promotion-service/*|docker/services/promotion-service/*) selected+=("promotion-service") ;;
              ai-assistant-service/*|docker/services/ai-assistant-service/*) selected+=("ai-assistant-service") ;;
            esac
          done <<< "${changed_files}"

          if [[ "${rebuild_all}" == "true" ]]; then
            selected=("${services[@]}")
          fi

          # 去重
          uniq_selected=()
          for s in "${selected[@]:-}"; do
            skip="false"
            for u in "${uniq_selected[@]:-}"; do
              [[ "${u}" == "${s}" ]] && skip="true" && break
            done
            [[ "${skip}" == "false" ]] && uniq_selected+=("${s}")
          done

          if (( ${#uniq_selected[@]} == 0 )); then
            echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"
            echo 'count=0' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          python - "${uniq_selected[@]}" <<'PY' >> "$GITHUB_OUTPUT"
          import json, sys
          services = [s for s in sys.argv[1:] if s]
          include = [{"service": s, "dockerfile": f"docker/services/{s}/Dockerfile"} for s in services]
          print("matrix=" + json.dumps({"include": include}, ensure_ascii=False))
          print("count=" + str(len(include)))
          PY

  build-push:
    needs: [compute-tag, detect-changes]
    runs-on: ubuntu-latest
    if: needs['detect-changes'].outputs.count != '0'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs['detect-changes'].outputs.matrix).include }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: 登录阿里云 ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: 镜像名（ACR）
        id: meta
        shell: bash
        run: |
          if [[ -z "${{ secrets.ACR_REGISTRY }}" || -z "${{ secrets.ACR_NAMESPACE }}" ]]; then
            echo "Missing secrets: ACR_REGISTRY / ACR_NAMESPACE" >&2
            exit 1
          fi
          echo "image=${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/hmall-${{ matrix.service }}" >> "$GITHUB_OUTPUT"

      - name: 构建并推送
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ needs['compute-tag'].outputs.tag }}
            ${{ steps.meta.outputs.image }}:latest

  retag-unchanged:
    needs: [compute-tag, detect-changes]
    runs-on: ubuntu-latest
    # 自动链路和手动发版都补齐 tag
    if: github.event_name == 'workflow_run' || github.event_name == 'workflow_dispatch'
    steps:
      - name: 登录阿里云 ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Setup buildx
        uses: docker/setup-buildx-action@v3

      - name: 为未构建服务补齐 SHA tag（从 latest 复用 manifest）
        shell: bash
        env:
          MATRIX: ${{ needs['detect-changes'].outputs.matrix }}
        run: |
          set -euo pipefail
          if [[ -z "${{ secrets.ACR_REGISTRY }}" || -z "${{ secrets.ACR_NAMESPACE }}" ]]; then
            echo "Missing secrets: ACR_REGISTRY / ACR_NAMESPACE" >&2
            exit 1
          fi
          tag="${{ needs['compute-tag'].outputs.tag }}"
          services=(hm-gateway item-service cart-service user-service trade-service pay-service promotion-service ai-assistant-service)

          echo "Using ACR: ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}, tag: ${tag}"

          # 本次实际构建的服务（JSON include -> service 列表）
          built="$(python - <<'PY'
          import json, os
          matrix=json.loads(os.environ["MATRIX"])
          print("\n".join([x.get("service","") for x in matrix.get("include", []) if x.get("service")]))
          PY
          )"

          is_built() {
            local s="$1"
            while IFS= read -r b; do
              [[ "$b" == "$s" ]] && return 0
            done <<< "${built}"
            return 1
          }

          for s in "${services[@]}"; do
            if is_built "$s"; then
              continue
            fi
            src="${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/hmall-${s}:latest"
            dst="${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/hmall-${s}:${tag}"
            echo "Retag ${src} -> ${dst}"
            docker buildx imagetools create -t "${dst}" "${src}"
          done
