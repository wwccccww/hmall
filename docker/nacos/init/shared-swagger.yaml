# 与 Springfox/Knife4j openapi2 兼容：Boot 2.6+ 须使用 ant 路径匹配，否则 documentationPluginsBootstrapper NPE
spring:
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

knife4j:
  enable: true
  openapi:
    title: ${hm.swagger.title:云汇智选接口文档}
    description: ${hm.swagger.description:"云汇智选接口文档"}
    version: v1.0.0
    group:
      default:
        group-name: default
        api-rule: package
        api-rule-resources:
          - ${hm.swagger.package:com.hmall}

