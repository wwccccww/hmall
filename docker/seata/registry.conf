registry {
  type = "nacos"
  nacos {
    application = "seata-server"
    serverAddr = "nacos:8848"
    group = "DEFAULT_GROUP"
    namespace = ""
    cluster = "default"
    # 与 Nacos 未开鉴权时一致；若开启鉴权再取消注释并填写
    # username = "nacos"
    # password = "nacos"
  }
}

config {
  type = "file"
  file {
    name = "file:/root/seata-config/file.conf"
  }
}
