global:
  scrape_interval: 15s

scrape_configs:
  # ---------------------------------------------------------------------------
  # 场景 A（默认）：业务微服务与 Prometheus 均在 Docker内，且与主栈共用外部网络名 **hmall_new**
  # 时，只保留下方 hmall-services-docker；compose 服务名（如 item-service）方可被解析。
  #
  # 场景 B：业务在 Windows 本机跑、Prometheus 在虚拟机 Docker 里时，请注释掉 hmall-services-docker，
  # 并取消注释 hmall-services-windows，把 192.168.116.1 换成你的宿主机在 VM网段内的可达地址。
  # ---------------------------------------------------------------------------

  # - job_name: hmall-services-windows
  #   metrics_path: /actuator/prometheus
  #   static_configs:
  #     - targets: ['192.168.116.1:8080']
  #       labels:
  #         service: hm-gateway
  #         env: windows-host
  #     - targets: ['192.168.116.1:8081']
  #       labels:
  #         service: item-service
  #         env: windows-host
  #     - targets: ['192.168.116.1:8082']
  #       labels:
  #         service: cart-service
  #         env: windows-host
  #     - targets: ['192.168.116.1:8084']
  #       labels:
  #         service: user-service
  #         env: windows-host
  #     - targets: ['192.168.116.1:8085']
  #       labels:
  #         service: trade-service
  #         env: windows-host
  #     - targets: ['192.168.116.1:8086']
  #       labels:
  #         service: pay-service
  #         env: windows-host
  #     - targets: ['192.168.116.1:8087']
  #       labels:
  #         service: promotion-service
  #         env: windows-host
  #     - targets: ['192.168.116.1:8090']
  #       labels:
  #         service: ai-assistant-service
  #         env: windows-host

  - job_name: hmall-services-docker
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - hm-gateway:8080
          - item-service:8081
          - cart-service:8082
          - user-service:8084
          - trade-service:8085
          - pay-service:8086
          - promotion-service:8087
          - ai-assistant-service:8090
