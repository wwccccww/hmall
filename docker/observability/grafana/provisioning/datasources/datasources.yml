# Grafana (统一界面)
#     │
#     ├── 查询指标 ──→ Prometheus (http://prometheus:9090)
#     │
#     ├── 查询日志 ──→ Loki (http://loki:3100)
#     │                    │
#     │                    └── 提取 traceId 跳转到 Tempo
#     │
#     └── 查询链路 ──→ Tempo (http://tempo:3200)
#                          │
#                          └── 携带 traceId 跳转到 Loki 查日志


apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    uid: prom

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    uid: loki
    jsonData:
      derivedFields:
        - datasourceUid: tempo
          matcherRegex: '"traceId":"([a-fA-F0-9]+)"'
          name: TraceID
          url: '$${__value.raw}'

  - name: Tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    uid: tempo
    jsonData:
      httpMethod: GET
      tracesToLogs:
        datasourceUid: loki
        tags:
          - traceId
        filterByTraceID: true
      serviceMap:
        datasourceUid: prom
