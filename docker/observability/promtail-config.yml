server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # 供 Grafana LogQL 使用：{service="user-service"}（与 Spring application.name 对齐，去掉 compose 前缀 hmall-）
      - source_labels: ['__meta_docker_container_name']
        regex: '/hmall-(.+)'
        target_label: service
        replacement: '$1'
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container

  # 方案A：采集 MySQL 慢查询日志（slow log）到 Loki
  - job_name: mysql-slowlog
    static_configs:
      - targets:
          - localhost
        labels:
          job: mysql-slowlog
          service: mysql
          log_type: slow
          __path__: /var/log/mysql/slow.log

    # slow log 为多行：合并后解析；输出单行 JSON（fp/tbl/qt/q）供 Loki | json 与钉钉 relay 聚合 TopN
    # 注意：勿把 query_time/sql 原文做成 Loki label（高基数）；指纹 fp 仅来自脱敏后的 sql_norm
    pipeline_stages:
      - multiline:
          firstline: '^# Time:'
          max_wait_time: 3s
      - regex:
          # 兼容 MySQL slow log：Query_time 块后允许 # 注释行；SET timestamp 行可选（无此行时很多环境整条不匹配 → Loki 完全无数据）
          # 注意：Promtail 使用 RE2；multiline 已保证每条事件独立
          expression: '(?s)^# Time:.*?(?:\r?\n)# User@Host:.*?(?:\r?\n)# Query_time: (?P<query_time>[0-9.]+)\s+Lock_time: (?P<lock_time>[0-9.]+)\s+Rows_sent: (?P<rows_sent>\d+)\s+Rows_examined: (?P<rows_examined>\d+)\s*(?:\r?\n)(?:#[^\r\n]*(?:\r?\n))*(?:SET timestamp=\d+;\s*(?:\r?\n))?(?P<sql>.*)$'
      - regex:
          expression: '(?i)(?:from|join|into|update)\s+`?(?P<tbl>[a-zA-Z0-9_.]+)`?'
          source: sql
      - template:
          source: sql_norm
          template: '{{ regexReplaceAll `''[^'']*''` (regexReplaceAll `\b\d+\b` .sql "?") (print "'" "?" "'") }}'
      - template:
          source: fp
          template: '{{ sha256sum .sql_norm | trunc 12 }}'
      - template:
          source: q
          template: '{{ .sql_norm | trunc 180 }}'
      - template:
          source: logline
          template: '{"fp":"{{ .fp }}","tbl":{{ (.tbl | default "") | toJson }},"qt":{{ .query_time }},"q":{{ .q | toJson }}}'
      - output:
          source: logline

  # 方案A：采集「Windows 本机运行的微服务」写到文件的日志（需先将 Windows 目录通过 SMB 挂载到虚拟机 /mnt/hmall，并在 compose 中映射为 /host-hmall）
