server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # 供 Grafana LogQL 使用：{service="user-service"}（与 Spring application.name 对齐，去掉 compose 前缀 hmall-）
      - source_labels: ['__meta_docker_container_name']
        regex: '/hmall-(.+)'
        target_label: service
        replacement: '$1'
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container

  # 方案A：采集「Windows 本机运行的微服务」写到文件的日志（需先将 Windows 目录通过 SMB 挂载到虚拟机 /mnt/hmall，并在 compose 中映射为 /host-hmall）
