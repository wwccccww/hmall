server:
  port: 8087

spring:
  application:
    name: promotion-service
  cloud:
    nacos:
      discovery:
        server-addr: ${spring.cloud.nacos.server-addr}
  profiles:
    active: local
  datasource:
    url: jdbc:mysql://${hm.db.host:192.168.116.130}:3306/hm-promotion?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: ${hm.db.pw:123}
  output:
    ansi:
      enabled: ALWAYS

mybatis-plus:
  configuration:
    default-enum-type-handler: com.baomidou.mybatisplus.core.handlers.MybatisEnumTypeHandler
  global-config:
    db-config:
      update-strategy: not_null
      id-type: auto

logging:
  level:
    com.hmall: debug
  pattern:
    dateformat: HH:mm:ss:SSS
  file:
    path: "logs/${spring.application.name}"

knife4j:
  enable: true
  openapi:
    title: 促销服务接口文档
    description: "云汇智选促销（优惠券秒杀）接口文档"
    version: v1.0.0
    group:
      default:
        group-name: default
        api-rule: package
        api-rule-resources:
          - com.hmall.promotion.controller
