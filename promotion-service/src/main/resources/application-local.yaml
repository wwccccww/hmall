hm:
  seckill:
    receive-rate-limit:
      enabled: true
      replenish-per-second: 10
      burst: 20
  db:
    host: 192.168.116.130  # 修改为你自己的虚拟机IP地址
    pw: 123                # 修改为 docker 中的 MySQL 密码
    database: hm-promotion

spring:
  cloud:
    nacos:
      server-addr: ${SPRING_CLOUD_NACOS_SERVER_ADDR:192.168.116.130:8848}
  redis:
    host: ${SPRING_REDIS_HOST:192.168.116.130}
    port: ${SPRING_REDIS_PORT:6379}
    password: ${SPRING_REDIS_PASSWORD:123456}
    # password: 123321   # 若 Redis 设置了密码，取消注释并填写
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: 100ms
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:192.168.116.130}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:sail}
    password: ${SPRING_RABBITMQ_PASSWORD:123}
    virtual-host: ${SPRING_RABBITMQ_VIRTUAL_HOST:/hmall}

