services:
  mysql:
    image: mysql:8.0.23
    container_name: hmall-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-time-zone=+08:00
    ports:
      - "3306:3306"
    volumes:
      - hmall_mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-123}"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks:
      - hmall-net

  redis:
    image: redis:7.2-alpine
    container_name: hmall-redis
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:-123456}"]
    ports:
      - "6379:6379"
    volumes:
      - hmall_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-123456}", "PING"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks:
      - hmall-net

  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: hmall-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-sail}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-123}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/hmall}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 30
    networks:
      - hmall-net

  nacos:
    image: nacos/nacos-server:v2.2.3
    container_name: hmall-nacos
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
      SPRING_DATASOURCE_PLATFORM: mysql
      MYSQL_SERVICE_HOST: mysql
      MYSQL_SERVICE_PORT: 3306
      MYSQL_SERVICE_DB_NAME: nacos_config
      MYSQL_SERVICE_USER: root
      MYSQL_SERVICE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123}
      JVM_XMS: 256m
      JVM_XMX: 256m
      JVM_XMN: 128m
      # 关闭鉴权时勿在 shared-seata / Seata registry.conf 中写 nacos 账号，否则客户端调登录接口易 500
      NACOS_AUTH_ENABLE: "false"
    ports:
      - "8848:8848"
      # Nacos 2.x 客户端 gRPC（8848+1000）；仅映射 8848 时，宿主机上的 Spring 连配置中心会卡在 9848 超时
      - "9848:9848"
    depends_on:
      mysql:
        condition: service_healthy
    # 部分 nacos/nacos-server 镜像无 wget；首次连 MySQL 启动较慢，start_period 内失败不计入 unhealthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf -o /dev/null http://127.0.0.1:8848/nacos/v1/console/health/readiness || curl -sf -o /dev/null http://127.0.0.1:8848/nacos/actuator/health || wget -q --spider http://127.0.0.1:8848/nacos/ || bash -c 'echo >/dev/tcp/127.0.0.1/8848'",
        ]
      interval: 10s
      timeout: 10s
      retries: 45
      start_period: 180s
    networks:
      - hmall-net

  nacos-seed:
    image: curlimages/curl:8.7.1
    container_name: hmall-nacos-seed
    depends_on:
      nacos:
        condition: service_healthy
    volumes:
      - ./docker/nacos/init:/init:ro
    entrypoint: ["/bin/sh", "/init/seed.sh"]
    environment:
      NACOS_ADDR: http://nacos:8848
      # 填 public 时 seed 脚本会省略 tenant，与控制台「public」一致；勿改成随意字符串除非已建对应命名空间 ID
      NACOS_NS: public
      NACOS_GROUP: DEFAULT_GROUP
    restart: "no"
    networks:
      - hmall-net

  # 以下三项与虚拟机里「单独起的」Seata/ES/Kibana 二选一即可：若宿主机已占用 8091/9200/5601，请改 ports 或停掉旧容器，避免端口冲突。
  # Linux 上 ES 若报 vm.max_map_count，宿主机执行：sysctl -w vm.max_map_count=262144
  # 若坚持用宿主机已有实例：可删掉对应 service，并为业务容器配置 extra_hosts: ["host.docker.internal:host-gateway"]，再把 HM_ES_HOST / HM_AI_KNOWLEDGE_ES_HOST 等指向 host.docker.internal。
  # 自检是否在 Nacos 注册：docker exec hmall-seata-server curl -s "http://nacos:8848/nacos/v1/ns/instance/list?serviceName=seata-server&groupName=DEFAULT_GROUP&namespaceId="
  # 宿主机上勿用主机名 nacos，应：curl -s "http://127.0.0.1:8848/nacos/v1/ns/instance/list?..."
  seata-server:
    image: seataio/seata-server:1.5.2
    container_name: hmall-seata-server
    hostname: seata-server
    ports:
      - "8091:8091"
      - "7091:7091"
    environment:
      SEATA_PORT: "8091"
      STORE_MODE: file
      # 1.5.2 为 Spring Boot：注册中心由 classpath application.yml 的 seata.registry 决定，registry.conf 不生效。
    volumes:
      - ./docker/seata/application.yml:/seata-server/config/application.yml:ro
    depends_on:
      nacos:
        condition: service_healthy
    # 7091 为控制台 HTTP。不用 curl -f（401/404 会误判）。无 curl/wget 时再试 bash+/dev/tcp 探 8091。
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s --connect-timeout 3 --max-time 5 -o /dev/null http://127.0.0.1:7091/ 2>/dev/null || wget -q -T 5 -O /dev/null http://127.0.0.1:7091/ 2>/dev/null || bash -c 'cat < /dev/null > /dev/tcp/127.0.0.1/8091' 2>/dev/null || exit 1",
        ]
      interval: 10s
      timeout: 8s
      retries: 18
      start_period: 120s
    networks:
      - hmall-net

  elasticsearch:
    image: elasticsearch:7.12.1
    container_name: hmall-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - hmall_es_data:/usr/share/elasticsearch/data
    ulimits:
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://127.0.0.1:9200/_cluster/health?wait_for_status=yellow&timeout=5s >/dev/null || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 60s
    networks:
      - hmall-net

  kibana:
    image: kibana:7.12.1
    container_name: hmall-kibana
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - hmall-net

  hm-gateway:
    build:
      context: .
      dockerfile: docker/services/hm-gateway/Dockerfile
    container_name: hmall-gateway
    environment:
      # docker：覆盖 application-local 中的宿主机 Redis/Nacos；并关闭 Sleuth（compose 未起 Tempo/Zipkin）
      SPRING_PROFILES_ACTIVE: local,docker
      SPRING_CLOUD_NACOS_SERVER_ADDR: nacos:8848
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD:-123456}
      SPRING_SLEUTH_ENABLED: "false"
    ports:
      - "8080:8080"
    depends_on:
      nacos:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hmall-net

  item-service:
    build:
      context: .
      dockerfile: docker/services/item-service/Dockerfile
    container_name: hmall-item-service
    environment:
      SPRING_PROFILES_ACTIVE: local,docker
      SPRING_CLOUD_NACOS_SERVER_ADDR: nacos:8848
      SPRING_SLEUTH_ENABLED: "false"
      HM_DB_HOST: mysql
      HM_DB_PW: ${MYSQL_ROOT_PASSWORD:-123}
      HM_ES_HOST: elasticsearch
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD:-123456}
    ports:
      - "8081:8081"
    depends_on:
      nacos:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      seata-server:
        condition: service_healthy
    networks:
      - hmall-net

  cart-service:
    build:
      context: .
      dockerfile: docker/services/cart-service/Dockerfile
    container_name: hmall-cart-service
    environment:
      SPRING_PROFILES_ACTIVE: local,docker
      SPRING_CLOUD_NACOS_SERVER_ADDR: nacos:8848
      SPRING_SLEUTH_ENABLED: "false"
      HM_DB_HOST: mysql
      HM_DB_PW: ${MYSQL_ROOT_PASSWORD:-123}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD:-123456}
    ports:
      - "8082:8082"
    depends_on:
      nacos:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hmall-net

  user-service:
    build:
      context: .
      dockerfile: docker/services/user-service/Dockerfile
    container_name: hmall-user-service
    environment:
      SPRING_PROFILES_ACTIVE: local,docker
      SPRING_CLOUD_NACOS_SERVER_ADDR: nacos:8848
      SPRING_SLEUTH_ENABLED: "false"
      HM_DB_HOST: mysql
      HM_DB_PW: ${MYSQL_ROOT_PASSWORD:-123}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD:-123456}
    ports:
      - "8084:8084"
    depends_on:
      nacos:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hmall-net

  trade-service:
    build:
      context: .
      dockerfile: docker/services/trade-service/Dockerfile
    container_name: hmall-trade-service
    environment:
      SPRING_PROFILES_ACTIVE: local,docker
      SPRING_CLOUD_NACOS_SERVER_ADDR: nacos:8848
      SPRING_SLEUTH_ENABLED: "false"
      HM_DB_HOST: mysql
      HM_DB_PW: ${MYSQL_ROOT_PASSWORD:-123}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD:-123456}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-sail}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-123}
      SPRING_RABBITMQ_VIRTUAL_HOST: ${RABBITMQ_VHOST:-/hmall}
    ports:
      - "8085:8085"
    depends_on:
      nacos:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      seata-server:
        condition: service_healthy
    networks:
      - hmall-net

  pay-service:
    build:
      context: .
      dockerfile: docker/services/pay-service/Dockerfile
    container_name: hmall-pay-service
    environment:
      SPRING_PROFILES_ACTIVE: local,docker
      SPRING_CLOUD_NACOS_SERVER_ADDR: nacos:8848
      SPRING_SLEUTH_ENABLED: "false"
      HM_DB_HOST: mysql
      HM_DB_PW: ${MYSQL_ROOT_PASSWORD:-123}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD:-123456}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-sail}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-123}
      SPRING_RABBITMQ_VIRTUAL_HOST: ${RABBITMQ_VHOST:-/hmall}
    ports:
      - "8086:8086"
    depends_on:
      nacos:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - hmall-net

  promotion-service:
    build:
      context: .
      dockerfile: docker/services/promotion-service/Dockerfile
    container_name: hmall-promotion-service
    environment:
      SPRING_PROFILES_ACTIVE: local,docker
      SPRING_CLOUD_NACOS_SERVER_ADDR: nacos:8848
      SPRING_SLEUTH_ENABLED: "false"
      HM_DB_HOST: mysql
      HM_DB_PW: ${MYSQL_ROOT_PASSWORD:-123}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD:-123456}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-sail}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-123}
      SPRING_RABBITMQ_VIRTUAL_HOST: ${RABBITMQ_VHOST:-/hmall}
    ports:
      - "8087:8087"
    depends_on:
      nacos:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - hmall-net

  promotion-service-2:
    build:
      context: .
      dockerfile: docker/services/promotion-service/Dockerfile
    container_name: hmall-promotion-service-2
    environment:
      SPRING_PROFILES_ACTIVE: local,docker
      SPRING_CLOUD_NACOS_SERVER_ADDR: nacos:8848
      SPRING_SLEUTH_ENABLED: "false"
      HM_DB_HOST: mysql
      HM_DB_PW: ${MYSQL_ROOT_PASSWORD:-123}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD:-123456}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-sail}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-123}
      SPRING_RABBITMQ_VIRTUAL_HOST: ${RABBITMQ_VHOST:-/hmall}
      JAVA_OPTS: "--server.port=8088 --spring.application.instance-id=promotion-8088"
    ports:
      - "8088:8088"
    depends_on:
      nacos:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - hmall-net

  ai-assistant-service:
    build:
      context: .
      dockerfile: docker/services/ai-assistant-service/Dockerfile
    container_name: hmall-ai-assistant-service
    environment:
      SPRING_PROFILES_ACTIVE: local,docker
      SPRING_CLOUD_NACOS_SERVER_ADDR: nacos:8848
      SPRING_SLEUTH_ENABLED: "false"
      HM_AI_LLM_BASE_URL: ${HM_AI_LLM_BASE_URL:-https://api.openai.com}
      HM_AI_LLM_API_KEY: ${HM_AI_LLM_API_KEY:-}
      HM_AI_LLM_MODEL: ${HM_AI_LLM_MODEL:-gpt-4o-mini}
      HM_AI_LLM_TIMEOUT_MS: ${HM_AI_LLM_TIMEOUT_MS:-15000}
      HM_AI_ITEM_BASE_URL: ${HM_AI_ITEM_BASE_URL:-http://item-service:8081}
      HM_AI_PROMOTION_BASE_URL: ${HM_AI_PROMOTION_BASE_URL:-http://promotion-service:8087}
      HM_AI_RAG_USE_ES: ${HM_AI_RAG_USE_ES:-true}
      HM_AI_KNOWLEDGE_ES_HOST: elasticsearch
      HM_AI_RAG_SEARCH_TOP_K: ${HM_AI_RAG_SEARCH_TOP_K:-20}
      HM_AI_RAG_PROMPT_MAX_ITEMS: ${HM_AI_RAG_PROMPT_MAX_ITEMS:-12}
      HM_AI_BAILIAN_APP_ID: ${HM_AI_BAILIAN_APP_ID:-}
      HM_AI_BAILIAN_ENDPOINT_BASE: ${HM_AI_BAILIAN_ENDPOINT_BASE:-https://dashscope.aliyuncs.com}
    ports:
      - "8090:8090"
    depends_on:
      nacos:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - hmall-net

volumes:
  hmall_mysql_data:
  hmall_redis_data:
  hmall_es_data:

# 外部网络名默认 hmall_new，与 docker-compose.observability.yml 一致（Prometheus 才能解析 item-service 等 compose 服务名）
networks:
  hmall-net:
    name: hmall_new
    driver: bridge

